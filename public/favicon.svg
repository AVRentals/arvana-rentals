<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C842"/>
      <stop offset="50%" stop-color="#E8A020"/>
      <stop offset="100%" stop-color="#C97D0A"/>
    </linearGradient>
  </defs>
  <!-- Dark charcoal background with rounded corners -->
  <rect width="32" height="32" rx="7" fill="#0F0F1A"/>
  <!-- Subtle gold top accent bar -->
  <rect x="6" y="4" width="20" height="1.5" rx="0.75" fill="url(#gold)" opacity="0.7"/>
  <!-- AR letters -->
  <text
    x="16"
    y="24"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="17"
    letter-spacing="-1"
    fill="url(#gold)"
  >AR</text>
</svg>
